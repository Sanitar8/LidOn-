<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Юридическая помощь лидерам — чат</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/css/legal-help.css">
</head>
<body class="legal-help-body">

  <div class="chat-shell">

    <header class="chat-header">
      <div class="chat-header__title">Юридический чат</div>
      <div class="chat-header__subtitle">
        Задайте вопрос юристу LIDON. Ответ появится здесь же в виде сообщений.
      </div>
    </header>

    <main class="chat-main" aria-label="Диалог с юристом">
      <div id="chatMessages" class="chat-messages">

        <!-- Стартовое сообщение юриста -->
        <div class="chat-row chat-row--lawyer">
          <div class="chat-avatar chat-avatar--lawyer" aria-hidden="true">L</div>
          <div class="chat-bubble chat-bubble--lawyer">
            <div class="chat-bubble__text">
              Добро пожаловать! Кратко опишите ситуацию и сформулируйте вопрос.
              Ваш юрист ответит вам, когда освободится.
            </div>
            <div class="chat-bubble__meta">Юрист LIDON</div>
          </div>
        </div>

      </div>
    </main>

    <!-- ✅ Composer: больше, без "окна внутри окна" -->
    <section class="chat-composer" aria-label="Отправка сообщения юристу">

      <!-- панель выбранного файла -->
      <div class="chat-attach" id="chatAttach" style="display:none;" aria-live="polite">
        <div class="chat-attach__preview" id="chatAttachPreview" aria-hidden="true"></div>
        <div class="chat-attach__meta">
          <div class="chat-attach__name" id="chatAttachName"></div>
          <div class="chat-attach__hint" id="chatAttachHint">
            Вложение отображается в чате (пока без загрузки на сервер).
          </div>
        </div>
        <button type="button" class="chat-attach__remove" id="chatAttachRemove" aria-label="Удалить вложение">×</button>
      </div>

      <div class="chat-composer__row">
        <!-- кнопка прикрепления (иконка SVG) -->
        <button
          id="chatClip"
          type="button"
          class="chat-iconbtn"
          aria-label="Прикрепить файл или фото"
          title="Прикрепить файл или фото"
        >
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
            <path d="M16.5 6.5l-7.78 7.78a3 3 0 104.24 4.24l8.48-8.48a5 5 0 10-7.07-7.07L5.64 11.69a7 7 0 109.9 9.9l6.36-6.36"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <input
          type="file"
          id="chatFile"
          hidden
          accept="image/*,.pdf,.doc,.docx,.txt"
        >

        <textarea
          id="chatInput"
          class="chat-composer__text"
          rows="3"
          placeholder="Напишите сообщение… (Enter — отправить, Shift+Enter — новая строка)"
          maxlength="2000"
        ></textarea>

        <button
          id="chatSend"
          type="button"
          class="chat-send"
          aria-label="Отправить сообщение"
          title="Отправить"
        >
          ➤
        </button>
      </div>

    </section>

  </div>

  <script src="/js/legal-help.js"></script>
</body>
</html>
