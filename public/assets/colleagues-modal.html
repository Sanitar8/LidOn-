<!-- COLLEAGUES MODAL (loaded dynamically) -->
<div class="colx" id="colxModal" aria-hidden="true">
  <div class="colx__overlay" data-colx-close="1"></div>

  <div class="colx__window" role="dialog" aria-modal="true" aria-label="Общение с коллегами LIDON">
    <button type="button" class="colx__close" id="colxClose" aria-label="Закрыть">×</button>

    <!-- TOP INFO: 3 Telegram links + QR (динамика из API) -->
    <div class="colx__top">
      <div class="colx__topHead">
        <div class="colx__title">Общение с коллегами LIDON</div>
        <div class="colx__subtitle" id="colxTopSubtitle">
          Ваши Telegram-чаты подбираются по выбранным профессиям.
        </div>
      </div>

      <div class="colx__tgGrid" id="colxTgGrid" aria-label="Telegram каналы по вашим профессиям">
        <!-- JS вставит карточки -->
      </div>
    </div>

    <!-- CHAT SWITCHER: кнопки под профессии (динамика из API) -->
    <div class="colx__switch" id="colxTabs" aria-label="Выбор чата">
      <!-- JS вставит табы -->
    </div>

    <!-- CHAT AREA (один, контент переключается) -->
    <div class="colxChat">
      <div class="colxChat__head">
        <div class="colxChat__headTitle" id="colxChatTitle">Чат</div>
        <div class="colxChat__headSub" id="colxChatSub">—</div>
      </div>

      <div class="colxChat__messages" id="colxMessages" aria-live="polite"></div>

      <div class="colxChat__footer">
        <button type="button" class="colxChat__attach" id="colxAttach" aria-label="Прикрепить файл" title="Прикрепить файл">⊕</button>
        <input type="file" id="colxFile" hidden accept="image/*,.pdf,.doc,.docx,.txt">

        <textarea
          class="colxChat__input"
          id="colxInput"
          rows="2"
          placeholder="Напишите сообщение… Enter — отправить, Shift+Enter — новая строка."
          maxlength="2000"
        ></textarea>

        <button type="button" class="colxChat__send" id="colxSend" aria-label="Отправить">➤</button>
      </div>
    </div>
  </div>
</div>
