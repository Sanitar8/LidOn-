<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Обращение и сотрудничество с LIDON — чат</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/cooperation.css">
</head>
<body class="coop-body">

  <div class="coop-shell">

    <header class="coop-header">
      <div class="coop-header__title">Обращение и сотрудничество с LIDON</div>
      <div class="coop-header__subtitle">
        Напишите нам: кто вы, чем занимаетесь и что хотите обсудить (можно контакт в тексте).
      </div>
    </header>

    <main class="coop-main" aria-label="Диалог с LIDON">
      <div id="coopMessages" class="coop-messages" aria-live="polite">

        <div class="coop-row coop-row--lidon">
          <div class="coop-avatar coop-avatar--lidon" aria-hidden="true">L</div>
          <div class="coop-bubble coop-bubble--lidon">
            <div class="coop-bubble__text">
Здравствуйте! Опишите ваш запрос по сотрудничеству или обращению.
Можно коротко: кто вы и что хотите обсудить.
            </div>
            <div class="coop-bubble__meta">LIDON</div>
          </div>
        </div>

      </div>
    </main>

    <section class="coop-composer" aria-label="Отправка сообщения">

      <div class="coop-attach" id="coopAttach" style="display:none;" aria-live="polite">
        <div class="coop-attach__preview" id="coopAttachPreview" aria-hidden="true"></div>
        <div class="coop-attach__meta">
          <div class="coop-attach__name" id="coopAttachName"></div>
          <div class="coop-attach__hint" id="coopAttachHint">
            Вложение отображается в чате (пока без загрузки на сервер).
          </div>
        </div>
        <button type="button" class="coop-attach__remove" id="coopAttachRemove" aria-label="Удалить вложение">×</button>
      </div>

      <div class="coop-composer__row">
        <button
          id="coopClip"
          type="button"
          class="coop-iconbtn"
          aria-label="Прикрепить файл или фото"
          title="Прикрепить файл или фото"
        >
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
            <path d="M16.5 6.5l-7.78 7.78a3 3 0 104.24 4.24l8.48-8.48a5 5 0 10-7.07-7.07L5.64 11.69a7 7 0 109.9 9.9l6.36-6.36"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <input
          type="file"
          id="coopFile"
          hidden
          accept="image/*,.pdf,.doc,.docx,.txt"
        >

        <textarea
          id="coopInput"
          class="coop-composer__text"
          rows="3"
          placeholder="Напишите сообщение… (Enter — отправить, Shift+Enter — новая строка)"
          maxlength="2000"
        ></textarea>

        <button
          id="coopSend"
          type="button"
          class="coop-send"
          aria-label="Отправить сообщение"
          title="Отправить"
        >
          ➤
        </button>
      </div>

    </section>

  </div>

  <script src="/assets/js/cooperation.js"></script>
</body>
</html>
