<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Новый пароль — LIDON</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/index.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/index.html" class="logo-block">
        <div class="logo-mark">LIDON</div>
        <div class="logo-text">
          <div class="logo-text-main">LIDON</div>
          <div class="logo-text-sub">ЛИДЕРЫ СФЕРЫ</div>
        </div>
      </a>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="block">
        <h1 class="section-title">Установить новый пароль</h1>
        <p class="block-text">Введите новый пароль (минимум 8 символов).</p>

        <div class="form-row">
          <label class="form-label" for="newpass">Новый пароль</label>
          <input id="newpass" type="password" class="form-input">
        </div>

        <div class="block-actions">
          <button class="btn btn-primary" id="savepass">Сохранить</button>
        </div>

        <p class="block-text" id="msg"></p>
      </div>
    </div>
  </main>

  <script>
    (function(){
      var token = new URLSearchParams(location.search).get('token') || '';
      var btn = document.getElementById('savepass');
      var msg = document.getElementById('msg');

      btn.addEventListener('click', async function(){
        msg.textContent = '';
        try {
          var pass = document.getElementById('newpass').value || '';

          var res = await fetch('/api/auth/reset', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            credentials:'same-origin',
            body: JSON.stringify({ token: token, password: pass })
          });

          var data = await res.json();

          if (!res.ok || !data.ok) {
            throw new Error((data && data.error) || 'Ошибка');
          }

          msg.textContent = data.message || 'Готово. Теперь можно войти.';
        } catch(e) {
          msg.textContent = e.message;
        }
      });
    })();
  </script>
</body>
</html>
